name: quranglow
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  rename: ^3.1.0
  http: ^1.5.0
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.3
  state_notifier: ^1.0.0
  google_fonts: ^8.1.0
  lottie: ^3.3.2
  wakelock_plus: ^1.4.0
  just_audio_windows: ^0.2.2
  flutter_launcher_icons: ^0.14.4
  rxdart: ^0.28.0
  quran: ^1.3.3
  timezone: ^0.11.0
  flutter_local_notifications: ^21.0.0
  geolocator: ^14.0.1
  flutter_compass: ^0.8.0
  sensors_plus: ^7.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  audio_service: ^0.18.18
  audio_session: ^0.2.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  firebase_messaging: ^16.2.2
  flutter_animate: ^4.5.2
  go_router: ^17.2.3
  intl: ^0.20.2
  scrollable_positioned_list: ^0.3.8
  speech_to_text: ^7.0.0
  home_widget: ^0.9.1
  hijri: ^3.0.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_native_splash: ^2.2.11

flutter:
  uses-material-design: true

  assets:
    - assets/anim/Quran.json
    - assets/iosn/icongrowquran.jpg
    - assets/images/
    - assets/voice/
    - shorebird.yaml

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/bustan_icon.png"
  adaptive_icon_background: "#FFFFFF"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/bustan_icon.png
  background_image: assets/images/bustan_splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/bustan_icon.png

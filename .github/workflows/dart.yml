name: Android APK

on:
  push:
    tags:
      - 'v*'          # عند عمل تاج إصدار
  workflow_dispatch:   # تشغيل يدوي

permissions:
  contents: write      # صلاحيات كتابة ضرورية لرفع الريليس

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quranglow   # <-- مهم

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Update pubspec.yaml version from Git Tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # استخراج رقم الإصدار من التاج (مثال: v1.0.2 -> 1.0.2)
          # وإذا كان التاج v1.0.2+3 يصبح 1.0.2+3
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "Updating pubspec.yaml version to: $TAG_VERSION"
          sed -i "s/^version: .*/version: $TAG_VERSION/" pubspec.yaml

      - name: Pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare APK release file
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # نسخ الـ APK وتسميته باسم جميل متوافق مع رقم الإصدار
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/QuranGlow-${{ github.ref_name }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: quranglow/build/app/outputs/flutter-apk/app-release.apk

      # يرفق الـ APK تلقائياً مع الريليس لو دفعت تاج v*
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: quranglow/build/app/outputs/flutter-apk/QuranGlow-${{ github.ref_name }}.apk
          name: "إصدار ${{ github.ref_name }}"
          body: "تحديث جديد لتطبيق بُستان (QuranGlow) - الإصدار ${{ github.ref_name }} 🎉"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
